":\"var(--border)\"}}]]}],[\"$\",\"div\",null,{\"className\":\"flex-1 flex flex-col items-center justify-center px-4 min-h-0 fade-up fade-up-4\",\"children\":[\"$\",\"$L8\",null,{\"projects\":[{\"slug\":\"mastercard\",\"title\":\"Mastercard\",\"subtitle\":\"Software Developer\",\"date\":\"Sep 2023 - Jun 2024\",\"team\":\"Mastercard R\u0026D, New York City\",\"tags\":[\"React\",\"TypeScript\",\"Node.js\",\"Python\"],\"description\":\"AI Fraud Monitoring tool and Data Dashboards\",\"longDescription\":\"I spent a year as a Software Developer for Mastercard working with the Ethoca and R\u0026D teams on various internal projects.\\n      In this role, I focused on building internal tools and data dashboards, simplifying decision making for non-technical staff and customers; \\n      and prototyped the use of AI in analysing and presenting complex financial data to stakeholders.\\n      By wearing various hats such as Product Designer, UX Researcher and Software Developer within the R\u0026D team, \\n      I gained first-hand experience of different parts of the product lifecycle.\",\"links\":[{\"label\":\"AI Fraud Monitoring Demo ↗\",\"url\":\"https://b2b.mastercard.com/news-and-insights/webinar/ai-for-transaction-fraud-monitoring-demo/\"},{\"label\":\"Fraud Insights App ↗\",\"url\":\"https://www.mastercard.com/content/dam/public/mastercardcom/globalrisk/pdf/osm-fraudinsightsissueracquirerexternalsummaryglobaljan25.pdf\"}],\"accent\":\"#ff6b47\",\"index\":0,\"heroImage\":\"/images/mccover.png\",\"galleryImages\":[]},{\"slug\":\"tiny-criminals\",\"title\":\"Tiny Criminals\",\"subtitle\":\"Godot Game Developer\",\"date\":\"Jan 2025 – Jun 2025\",\"team\":\"Group Project - Aalto Game Design\",\"tags\":[\"Godot\",\"GDScript\"],\"description\":\"Racing Game with Cozy Sim elements\",\"longDescription\":\"Tiny Criminals is a fast paced racing game with cozy sim elements made in Godot. \\n    In Tiny Criminals, life’s all about vibing on your own terms. \\n    Plan a heist, grab some loot, then kick back on your island hideout. \\n    No stress, no rules — just sun, schemes, and a whole lot of fun. \\n    Through this project, I used GDScript to implement NPC behaviours, UI and animations. \\n    I also polished gameplay actions like the in-game shop UI functions and decoration placement UI.\\n    By working with people from multiple disciplines, I learnt to scope, test and ship a complete game product.\\n    This game was made in collaboration with Eelis Koivusaari, Michelle Lauriste, Yuchen Hu and Yu-Jung Liu.\\n    \",\"links\":[{\"label\":\"Trailer ↗\",\"url\":\"https://www.youtube.com/embed/J8EVziidqNc?si=dN_R89L0qWlGVCw0\"},{\"label\":\"Itch ↗\",\"url\":\"https://eelis-koivusaari.itch.io/tiny-criminals\"}],\"accent\":\"#b447ff\",\"index\":1,\"heroImage\":\"/images/tccover.gif\",\"galleryImages\":[\"/images/tc1.jpg\",\"/images/tc2.jpg\"]},{\"slug\":\"sap\",\"title\":\"SAP\",\"subtitle\":\"Design Technologist Internship\",\"date\":\"Jun 2022 - May 2023\",\"team\":\"SAP Labs US, Palo Alto, CA\",\"tags\":[\"TypeScript\",\"Three.js\",\"Figma\",\"Framer\"],\"description\":\"Product Demos, Data Dashboards and Design Mock-ups\",\"longDescription\":\"I spent a summer working full-time as an intern within SAP.io and \\n    continued part-time for a year after as a Design Technologist within the Design Innovation team \\n    building prototypes for SAP's internal start-up incubator and conducting research on various new technologies.\\n    While at SAP, I shipped a dashboard app for suppliers and SAP customers to automate ordering tasks, \\n    developed and documented a library of reusable React components in Framer for making future demos and\\n    contributed to the development of a permanent installation at the SAP office in Palo Alto.\\n    \",\"links\":[{\"label\":\"Digital Finance Demo ↗\",\"url\":\"https://www.sap.com/assetdetail/2024/10/48e4530f-dd7e-0010-bca6-c68f7e60039b.html\"},{\"label\":\"Procurement Simulator ↗\",\"url\":\"https://www.sap.com/products/spend-management/procurement-strategy.html\"}],\"accent\":\"#47a1ff\",\"index\":2,\"heroImage\":\"/images/sapcover.png\",\"galleryImages\":[]},{\"slug\":\"photocrit\",\"title\":\"PhotoCrit: Fish Edition\",\"subtitle\":\"Unity Developer\",\"date\":\"Aug 2024 - Dec 2024\",\"team\":\"Solo - Aalto Media Lab\",\"tags\":[\"Unity\",\"Arduino\",\"PComp\"],\"description\":\"Photography Game visualising endangered fish data with Alt Controller\",\"longDescription\":\"PhotoCrit: Fish Edition is a photography game where you find and photograph critically endangered fish in a digital aquarium. \\n    Using a custom-made polaroid camera controller, players can take pictures of and learn more about the fish in the game in real time. \\n    The game is a gallery that represents the biodiversity we are losing to progress and uses digital technology to permanently enshrine species that will be lost to time in the next few years.\\n    This project was presented at the Aalto Media Lab Winter Demo Day 2024 and installed at the Marsio Gallery as part of the Aalto Media Lab 30 Years exhibition from Dec 2024 - Jan 2025.\\n    \",\"links\":[{\"label\":\"Dataset ↗\",\"url\":\"https://www.iucnredlist.org/\"}],\"accent\":\"#ff6b47\",\"index\":3,\"heroImage\":\"/images/pcritcover.jpg\",\"galleryImages\":[\"/images/pcrit1.png\",\"/images/pcrit2.png\",\"/images/pcrit3.jpg\"]},{\"slug\":\"cloud-theory\",\"title\":\"Cloud Theory\",\"subtitle\":\"Research Assistant - Unity Developer\",\"date\":\"Nov 2021 - May 2023\",\"team\":\"Colleen Macklin, Parsons PETLab\",\"tags\":[\"Python\",\"Unity\",\"GPT\"],\"description\":\"Relaxing Conversation Game built on custom GPT model\",\"longDescription\":\"I worked as a research assistant on Cloud Theory, working with Parsons game design professor Colleen Macklin. \\n    Cloud Theory is a relaxing videogame where you lay on the ground and look at clouds. \\n    Every once in a while you or your friend might see a shape in the clouds, which sparks conversation about everything from the origin of poodles to the deepest mysteries of life. \\n    For this project, I implemented a live connection between a fine-tuned GPT-Neo model hosted on HuggingFace and Unity.\\n    A demo of this game was presented by Colleen Macklin at WordHack NYC 2023.\\n    It is in ongoing development at PETLab, a game research group at Parsons.\\n    \",\"links\":[{\"label\":\"Demo Talk ↗\",\"url\":\"https://youtu.be/E8Yoo0lB2uY?t=4224\"},{\"label\":\"Project Page ↗\",\"url\":\"https://www.colleenmacklin.com/clouds\"}],\"accent\":\"#b447ff\",\"index\":4,\"heroImage\":\"/images/ctcover.gif\",\"galleryImages\":[\"/images/ct1.png\",\"/images/ct2.png\",\"/images/ct3.png\"]},{\"slug\":\"corpora-caelestia\",\"title\":\"Corpora Caelestia\",\"subtitle\":\"Front-end Developer\",\"date\":\"Aug 2021 - Dec 2021\",\"team\":\"Solo - Parsons School of Design\",\"tags\":[\"Three.js\",\"JavaScript\",\"Python\"],\"description\":\"3D Data Visualisation of satellites in GEO orbit\",\"longDescription\":\"Corpora Caelestia is a visualisation of satellites in geostationary(GEO) orbit that were launched from 2019-2021. \\n    It showcases the inequalities between the world's nations using satellites as an indicator of power and status. \\n    Each satellite is procedurally generated based on factors like purpose, year of launch, etc. and mapped to its location in space using actual satellite position data.\\n    To spatially grasp complex satellite data, the visualisation is built as a 3D website using the Three.js library.\\n    \",\"links\":[{\"label\":\"Live Site ↗\",\"url\":\"https://rayateapurv.github.io/labsystems/cas-website/\"},{\"label\":\"Dataset ↗\",\"url\":\"https://www.ucs.org/resources/satellite-database\"}],\"accent\":\"#47a1ff\",\"index\":5,\"heroImage\":\"/images/cccover.gif\",\"galleryImages\":[\"/images/cc1.png\",\"/images/cc2.png\"]}]}]}]]}],null,\"$L9\"]}],{},null,false]},null,false],\"$La\",false]],\"m\":\"$undefined\",\"G\":[\"$b
